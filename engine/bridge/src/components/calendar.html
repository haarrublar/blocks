<div class="calendar-container">
  <div style="margin-left: 20px">
    <h2>SESSION</h2>
    <p>Select the session date.</p>
  </div>
  <div id="calendar">
    <div class="cal-header">
      <button id="cal-prev">
        <i class="fa-solid fa-chevron-left fa-lg" style="cursor: pointer"></i>
      </button>
      <span id="cal-month-label"></span>
      <button id="cal-next">
        <i class="fa-solid fa-chevron-right fa-lg" style="cursor: pointer"></i>
      </button>
    </div>
    <div class="cal-weekdays">
      <span>Mo</span><span>Tu</span><span>We</span> <span>Th</span
      ><span>Fr</span><span>Sa</span><span>Su</span>
    </div>
    <div id="cal-days"></div>
    <div class="cal-footer">
      <span id="cal-selected-label">No date selected</span>
      <button id="cal-select-btn">Select</button>
    </div>
  </div>
</div>
